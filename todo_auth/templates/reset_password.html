{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[85vh]">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
        
        <div class="bg-indigo-600 p-8 text-center">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-white/20 rounded-xl mb-3 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 11-7.743-5.743L11 3l-2 2H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4a2 2 0 01.4-.8l4.4-4.4a2 2 0 012.8 2.8l-4.4 4.4a2 2 0 01-.8.4V19a2 2 0 01-2 2h-1.4l-2.6 2.6a2 2 0 01-2.8 0l-2.2-2.2a2 2 0 010-2.8l2.2-2.2L11 15v-1.4a2 2 0 01.4-.8l4.4-4.4a2 2 0 012.8 2.8l-4.4 4.4a2 2 0 01-.8.4V11" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-white tracking-tight">Security Update</h1>
            <p class="text-indigo-100 text-xs mt-1">Manage your TickMark access</p>
        </div>

        <form action="" method="POST" class="p-8 space-y-5">
            {% csrf_token %}

            {% if error %}
            <div class="bg-red-50 border-l-4 border-red-500 p-3 rounded-r-lg flex items-center gap-2">
                <p class="text-xs font-bold text-red-800">{{ error }}</p>
            </div>
            {% endif %}

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Current Password</label>
                    <input type="password" name="cPasw" placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all bg-slate-50 focus:bg-white" required>
                </div>

                <div class="relative py-2 flex items-center">
                    <div class="flex-grow border-t border-slate-100"></div>
                    <span class="flex-shrink mx-4 text-[10px] font-bold text-slate-300 uppercase tracking-widest">New Credentials</span>
                    <div class="flex-grow border-t border-slate-100"></div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">New Password</label>
                    <input type="password" name="nPasw" placeholder="Min. 8 characters"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all bg-slate-50 focus:bg-white" required>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Confirm Password</label>
                    <input type="password" name="confirmPasw" placeholder="Repeat new password"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all bg-slate-50 focus:bg-white" required>
                </div>
            </div>

            <div class="pt-2 space-y-3">
                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-100 transition-all transform hover:-translate-y-1 active:scale-95">
                    Confirm Changes
                </button>
                
                <a href="{% url 'profile' %}" class="flex items-center justify-center text-sm font-bold text-slate-400 hover:text-indigo-600 transition-colors">
                    ← Back to Profile
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
