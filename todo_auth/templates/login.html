{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">

        <div class="bg-gradient-to-r from-indigo-600 to-violet-600 p-8 text-center">
            <h1 class="text-3xl font-bold text-white mb-2">Welcome Back</h1>
            <p class="text-indigo-100 text-sm">Ready to crush your goals? Log in to your tasks.</p>
        </div>

        <form action="" method="POST" class="p-8 space-y-6">
            {% csrf_token %}

            {% if error %}
            <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r-xl">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-red-800">{{error}}</p>
                    </div>
                </div>
            </div>
            {% endif %}

            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your username"
                    class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition duration-200"
                    required>
            </div>

            <div>
                <div class="flex justify-between mb-2">
                    <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
                    <a href="#" class="text-xs text-indigo-600 hover:text-indigo-500 font-medium">Forgot Password?</a>
                </div>
                <input type="password" name="password" id="password" placeholder="••••••••"
                    class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition duration-200"
                    required>
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-indigo-200 transition-all duration-300 transform hover:-translate-y-0.5">
                Sign In
            </button>

            <p class="text-center text-sm text-slate-600 mt-6">
                Don't have an account?
                <a href="{% url 'register' %}" class="font-bold text-indigo-600 hover:underline">Create Account</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
