<section class="flex flex-col h-screen w-64 bg-white border-r border-slate-200 shadow-sm">
    <aside class="p-6 border-b border-slate-100">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">TickMark</h1>
        </div>
    </aside>

    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
        <ul class="space-y-1">
            <li>
                <a href="{% url 'home' %}" class="flex items-center gap-3 px-4 py-3 text-slate-600 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-all group">
                    <span class="font-medium">Home</span>
                </a>
            </li>
            <li>
                <a href="{% url 'add' %}" class="flex items-center gap-3 px-4 py-3 text-slate-600 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-all">
                    <span class="font-medium">Add Task</span>
                </a>
            </li>
            <li>
                <a href="{% url 'complete' %}" class="flex items-center gap-3 px-4 py-3 text-slate-600 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-all">
                    <span class="font-medium">Completed</span>
                </a>
            </li>
            <li>
                <a href="{% url 'trash' %}" class="flex items-center gap-3 px-4 py-3 text-slate-600 rounded-xl hover:bg-indigo-50 hover:text-indigo-600 transition-all">
                    <span class="font-medium">Trash</span>
                </a>
            </li>
        </ul>

        <div class="my-4 border-t border-slate-100 mx-4"></div>

        <ul class="space-y-1">
            <li>
                <a href="{% url 'about' %}" class="flex items-center gap-3 px-4 py-3 text-slate-600 rounded-xl hover:bg-slate-50 transition-all">
                    <span class="font-medium text-sm">About</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="p-4 bg-slate-50 border-t border-slate-100">
        {% if user.is_authenticated %}
            <div class="flex flex-col gap-2">
                <a href="{% url 'profile' %}" class="flex items-center gap-3 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-white rounded-lg transition-all shadow-sm border border-transparent hover:border-slate-200">
                    Profile({{request.user.username}})
                </a>
                <a href="{% url 'logout' %}" class="px-4 py-2 text-sm font-semibold text-red-600 hover:bg-red-50 rounded-lg transition-all text-center">
                    Logout
                </a>
            </div>
        {% else %}
            <div class="grid grid-cols-2 gap-2">
                <a href="{% url 'login' %}" class="text-center py-2 text-sm font-bold text-slate-600 hover:text-indigo-600">Login</a>
                <a href="{% url 'register' %}" class="text-center py-2 text-sm font-bold bg-indigo-600 text-white rounded-lg shadow-md shadow-indigo-100">Join</a>
            </div>
        {% endif %}
    </div>
</section>
