{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-10">
    <div class="flex items-center gap-4 mb-8">
        <div class="bg-indigo-600 p-3 rounded-2xl shadow-lg shadow-indigo-100 text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
        </div>
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Create New Task</h1>
            <p class="text-slate-500 text-sm">Fill in the details below to stay on track.</p>
        </div>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
        <form action="" method="POST" class="p-8 space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Task Title</label>
                <input type="text" name="title" placeholder="e.g., Design Landing Page"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition duration-200 bg-slate-50 focus:bg-white text-slate-800 font-medium" 
                    required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Description</label>
                <textarea name="desc" rows="4" placeholder="What needs to be done? (Optional)"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition duration-200 bg-slate-50 focus:bg-white text-slate-800 resize-none"></textarea>
            </div>

            <!-- <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Priority</label>
                    <select name="priority" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50 transition">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Due Date</label>
                    <input type="date" name="due_date" 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50 transition">
                </div>
            </div> -->

            <div class="pt-4 flex items-center justify-end gap-4 border-t border-slate-50">
                <a href="{% url 'home' %}" class="px-6 py-3 text-sm font-bold text-slate-500 hover:text-slate-700 transition">
                    Cancel
                </a>
                <button type="submit" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-10 rounded-xl shadow-lg shadow-indigo-100 transition-all transform hover:-translate-y-0.5 active:scale-95">
                    Save Task
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
